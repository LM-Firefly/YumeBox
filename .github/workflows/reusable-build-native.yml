name: Reusable Build Native

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      kernel_channel:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lib/native/rust/target/
          key: ${{ runner.os }}-rust-${{ hashFiles('lib/native/rust/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ""

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
          key: ${{ runner.os }}-ndk-29.0.14206865-v1
          restore-keys: |
            ${{ runner.os }}-ndk-29.0.14206865-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;29.0.14206865"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> local.properties

      - name: Update CA certificates
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          mkdir -p core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run: |
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh "${{ inputs.kernel_channel }}"

      - name: Build Native Libraries
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
        run: kotlin scripts/native-build.main.kts --all

      - name: Verify native outputs
        shell: bash
        run: |
          set -eu
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            test -f "jniLibs/${abi}/libclash.so"
            test -f "jniLibs/${abi}/liboverride.so"
            test -f "jniLibs/${abi}/libbridge.so"
          done
          test -f "build/generated/assets/geo/geoip.metadb.xz"
          test -f "build/generated/assets/geo/geosite.dat.xz"
          test -f "build/generated/assets/geo/ASN.mmdb.xz"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ inputs.channel }}
          path: |
            jniLibs
            build/generated/assets/geo
          if-no-files-found: error
