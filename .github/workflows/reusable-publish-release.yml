name: Reusable Publish Release

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      release_name:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
      publish_artifacts:
        required: true
        type: string
      cleanup_assets:
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: publish-${{ inputs.channel }}-*
          path: publish
          merge-multiple: true

      - name: Cleanup existing assets for rolling tag
        if: inputs.cleanup_assets
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ inputs.release_tag }}';
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              const assets = release.data.assets || [];
              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
                core.info(`Deleted asset ${asset.name}`);
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release for tag ${tag} not found, skip cleanup.`);
              } else {
                throw error;
              }
            }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          draft: false
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: ${{ inputs.channel == 'stable' }}
          files: publish/*.apk
