name: Reusable Build APK And Publish

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      release_name:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
      publish_release:
        required: false
        type: boolean
        default: true
      meta_asset_name:
        required: true
        type: string
      cleanup_assets:
        required: true
        type: boolean
      telegram_title:
        required: true
        type: string
      send_telegram:
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ inputs.channel }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      META_ASSET_NAME: ${{ inputs.meta_asset_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: ""

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
          key: ${{ runner.os }}-ndk-29.0.14206865-v1
          restore-keys: |
            ${{ runner.os }}-ndk-29.0.14206865-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;29.0.14206865"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> local.properties

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ inputs.channel }}
          path: .

      - name: Verify native and geo inputs
        shell: bash
        run: |
          set -eu
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            test -f "jniLibs/${abi}/libclash.so"
            test -f "jniLibs/${abi}/liboverride.so"
            test -f "jniLibs/${abi}/libbridge.so"
          done
          test -f "build/generated/assets/geo/geoip.metadb.xz"
          test -f "build/generated/assets/geo/geosite.dat.xz"
          test -f "build/generated/assets/geo/ASN.mmdb.xz"

      - name: Write signing config
        run: |
          if [ -n "${{ secrets.SIGNING_STORE_PASSWORD }}" ]; then
            echo "keystore.password=${{ secrets.SIGNING_STORE_PASSWORD }}" > signing.properties
            echo "key.alias=${{ secrets.SIGNING_KEY_ALIAS }}" >> signing.properties
            echo "key.password=${{ secrets.SIGNING_KEY_PASSWORD }}" >> signing.properties
            echo "keystore.path=release.keystore" >> signing.properties
          fi

      - name: Read version info
        id: version
        shell: bash
        run: |
          set -eu
          version_name="$(grep '^project.version.name=' gradle.properties | cut -d= -f2-)"
          version_code="$(grep '^project.version.code=' gradle.properties | cut -d= -f2-)"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"

      - name: Generate locale sources
        run: kotlin scripts/generate-locale.main.kts .

      - name: Build Release APKs
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            -Pupdate.channel="${{ inputs.channel }}" \
            -Pupdate.tag="${{ inputs.release_tag }}" \
            -Pupdate.metaAssetName="${{ inputs.meta_asset_name }}" \
            assembleRelease

      - name: Generate release notes
        shell: bash
        run: |
          set -eu
          mkdir -p publish/meta
          notes_file="publish/meta/release-notes.txt"

          if [ "${{ inputs.channel }}" = "stable" ]; then
            prev_tag="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${{ inputs.release_tag }}" | head -n 1 || true)"
            if [ -n "$prev_tag" ]; then
              git log --pretty='- %s (%h)' "${prev_tag}..HEAD" > "$notes_file"
            else
              git log --pretty='- %s (%h)' -n 20 > "$notes_file"
            fi
          else
            git log --pretty='- %s (%h)' -n 20 > "$notes_file"
          fi

          if [ ! -s "$notes_file" ]; then
            echo "- No release notes." > "$notes_file"
          fi

      - name: Prepare publish artifacts
        shell: bash
        run: |
          set -eu
          mkdir -p publish
          version_name="${{ steps.version.outputs.version_name }}"
          version_code="${{ steps.version.outputs.version_code }}"
          release_url="https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}"
          publish_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          while IFS= read -r file; do
            base="$(basename "$file")"
            abi="universal"
            case "$base" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
              *) abi="universal" ;;
            esac

            new_name="yumebox-${{ inputs.channel }}-${version_name}-${version_code}-${abi}.apk"
            cp -f "$file" "publish/${new_name}"
          done < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort)

          if [ ! -d publish ] || [ -z "$(ls -A publish)" ]; then
            echo "No APK generated" >&2
            exit 1
          fi

          export CHANNEL="${{ inputs.channel }}"
          export RELEASE_TAG="${{ inputs.release_tag }}"
          export META_ASSET_NAME="${{ inputs.meta_asset_name }}"
          export VERSION_NAME="${version_name}"
          export VERSION_CODE="${version_code}"
          export RELEASE_URL="${release_url}"
          export PUBLISHED_AT="${publish_time}"

          python3 - <<'PY'
import hashlib
import json
import os
from pathlib import Path

publish_dir = Path("publish")
release_notes_path = Path("publish/meta/release-notes.txt")
channel = os.environ["CHANNEL"]
release_tag = os.environ["RELEASE_TAG"]
meta_asset_name = os.environ["META_ASSET_NAME"]
repo = os.environ["GITHUB_REPOSITORY"]
sha = os.environ["GITHUB_SHA"]
version_name = os.environ["VERSION_NAME"]
version_code = int(os.environ["VERSION_CODE"])
release_url = os.environ["RELEASE_URL"]
published_at = os.environ["PUBLISHED_AT"]
release_notes = release_notes_path.read_text(encoding="utf-8").strip() if release_notes_path.exists() else ""

packages = []
for apk in sorted(publish_dir.glob("*.apk")):
    name = apk.name
    abi = "universal"
    if "-arm64-v8a.apk" in name:
        abi = "arm64-v8a"
    elif "-armeabi-v7a.apk" in name:
        abi = "armeabi-v7a"
    elif "-x86_64.apk" in name:
        abi = "x86_64"
    elif "-x86.apk" in name:
        abi = "x86"

    h = hashlib.sha256()
    with apk.open("rb") as f:
        for chunk in iter(lambda: f.read(1024 * 1024), b""):
            h.update(chunk)

    packages.append({
        "abi": abi,
        "fileName": name,
        "downloadUrl": f"https://github.com/{repo}/releases/download/{release_tag}/{name}",
        "size": apk.stat().st_size,
        "sha256": h.hexdigest(),
        "isUniversal": abi == "universal",
    })

meta = {
    "schemaVersion": 1,
    "channel": channel,
    "tag": release_tag,
    "versionName": version_name,
    "versionCode": version_code,
    "publishedAt": published_at,
    "commitSha": sha,
    "releaseNotes": release_notes,
    "releaseUrl": release_url,
    "packages": packages,
}

meta_dir = Path("publish/meta")
meta_dir.mkdir(parents=True, exist_ok=True)
(meta_dir / meta_asset_name).write_text(
    json.dumps(meta, ensure_ascii=False, indent=2) + "\n",
    encoding="utf-8",
)
PY

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ inputs.channel }}
          path: |
            publish/*.apk
            publish/meta/${{ inputs.meta_asset_name }}
          if-no-files-found: error

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: mappings-${{ inputs.channel }}
          path: app/build/outputs/mapping/release/
          if-no-files-found: error

      - name: Cleanup existing assets for rolling tag
        if: inputs.publish_release && inputs.cleanup_assets
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ inputs.release_tag }}';
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              const assets = release.data.assets || [];
              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
                core.info(`Deleted asset ${asset.name}`);
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release for tag ${tag} not found, skip cleanup.`);
              } else {
                throw error;
              }
            }

      - name: Publish release assets
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          body_path: publish/meta/release-notes.txt
          prerelease: ${{ inputs.prerelease }}
          draft: false
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: ${{ inputs.channel == 'stable' }}
          files: |
            publish/*.apk
            publish/meta/${{ inputs.meta_asset_name }}

      - name: Check upload availability
        id: check_upload
        shell: bash
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram notification
        if: inputs.send_telegram && steps.check_upload.outputs.upload == 'true'
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          TITLE: ${{ inputs.telegram_title }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW_NAME: ${{ github.workflow }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}
          META_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}/${{ inputs.meta_asset_name }}
          PUBLISH_DIR: publish
        run: python3 "${GITHUB_WORKSPACE}/scripts/yumebot.py"
