name: CI Channel

on:
  push:
    branches: [ "Yumes", "Dev" ]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "website/**"
      - ".gitignore"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: ci-channel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-native-abi-pre-armeabi-v7a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: armeabi-v7a
    secrets: inherit

  build-native-abi-pre-arm64-v8a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: arm64-v8a
    secrets: inherit

  build-native-abi-pre-x86:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: x86
    secrets: inherit

  build-native-abi-pre-x86_64:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: x86_64
    secrets: inherit

  build-native-abi-smart-armeabi-v7a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: armeabi-v7a
    secrets: inherit

  build-native-abi-smart-arm64-v8a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: arm64-v8a
    secrets: inherit

  build-native-abi-smart-x86:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: x86
    secrets: inherit

  build-native-abi-smart-x86_64:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: x86_64
    secrets: inherit

  bundle-native-pre:
    needs:
      - build-native-abi-pre-armeabi-v7a
      - build-native-abi-pre-arm64-v8a
      - build-native-abi-pre-x86
      - build-native-abi-pre-x86_64
    uses: ./.github/workflows/reusable-bundle-native.yml
    with:
      channel: pre
    secrets: inherit

  bundle-native-smart:
    needs:
      - build-native-abi-smart-armeabi-v7a
      - build-native-abi-smart-arm64-v8a
      - build-native-abi-smart-x86
      - build-native-abi-smart-x86_64
    uses: ./.github/workflows/reusable-bundle-native.yml
    with:
      channel: smart
    secrets: inherit

  build-apk-pre-app:
    needs: bundle-native-pre
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: pre
      module: app
      artifact_prefix: yumebox-pre
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-meta.json
      raw_apk_artifact_name: apk-raw-pre-app
    secrets: inherit

  build-apk-pre-lite:
    needs: bundle-native-pre
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: pre
      module: lite
      artifact_prefix: yumebox-lite-alpha
      release_tag: Pre-release
      meta_asset_name: yumebox-lite-alpha-meta.json
      raw_apk_artifact_name: apk-raw-pre-lite
    secrets: inherit

  build-apk-pre-app-with-extension:
    needs: bundle-native-pre
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: pre
      module: app
      artifact_prefix: yumebox-pre-extension
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-extension-meta.json
      raw_apk_artifact_name: apk-raw-pre-app-with-extension
      with_extension: true
    secrets: inherit

  build-apk-pre-extension:
    needs: bundle-native-pre
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: pre
      module: extension
      artifact_prefix: yumebox-pre-extension-standalone
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-extension-standalone-meta.json
      raw_apk_artifact_name: apk-raw-pre-extension
    secrets: inherit

  build-apk-smart-app:
    needs: bundle-native-smart
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: smart
      module: app
      artifact_prefix: yumebox-smart
      release_tag: Smart
      meta_asset_name: yumebox-smart-meta.json
      raw_apk_artifact_name: apk-raw-smart-app
    secrets: inherit

  build-apk-smart-extension:
    needs: bundle-native-smart
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: smart
      module: extension
      artifact_prefix: yumebox-smart-extension-standalone
      release_tag: Smart
      meta_asset_name: yumebox-smart-extension-standalone-meta.json
      raw_apk_artifact_name: apk-raw-smart-extension
    secrets: inherit

  prepare-publish-pre-app:
    needs: build-apk-pre-app
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: pre
      module: app
      artifact_prefix: yumebox-pre
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-meta.json
      raw_apk_artifact_name: apk-raw-pre-app
      publish_artifact_name: publish-pre-app
    secrets: inherit

  prepare-publish-pre-lite:
    needs: build-apk-pre-lite
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: pre
      module: lite
      artifact_prefix: yumebox-lite-alpha
      release_tag: Pre-release
      meta_asset_name: yumebox-lite-alpha-meta.json
      raw_apk_artifact_name: apk-raw-pre-lite
      publish_artifact_name: publish-pre-lite
    secrets: inherit

  prepare-publish-pre-app-with-extension:
    needs: build-apk-pre-app-with-extension
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: pre
      module: app
      artifact_prefix: yumebox-pre-extension
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-extension-meta.json
      raw_apk_artifact_name: apk-raw-pre-app-with-extension
      publish_artifact_name: publish-pre-app-with-extension
    secrets: inherit

  prepare-publish-pre-extension:
    needs: build-apk-pre-extension
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: pre
      module: extension
      artifact_prefix: yumebox-pre-extension-standalone
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-extension-standalone-meta.json
      raw_apk_artifact_name: apk-raw-pre-extension
      publish_artifact_name: publish-pre-extension
    secrets: inherit

  prepare-publish-smart-app:
    needs: build-apk-smart-app
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: smart
      module: app
      artifact_prefix: yumebox-smart
      release_tag: Smart
      meta_asset_name: yumebox-smart-meta.json
      raw_apk_artifact_name: apk-raw-smart-app
      publish_artifact_name: publish-smart-app
    secrets: inherit

  prepare-publish-smart-extension:
    needs: build-apk-smart-extension
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: smart
      module: extension
      artifact_prefix: yumebox-smart-extension-standalone
      release_tag: Smart
      meta_asset_name: yumebox-smart-extension-standalone-meta.json
      raw_apk_artifact_name: apk-raw-smart-extension
      publish_artifact_name: publish-smart-extension
    secrets: inherit

  delete-pre-release-tag:
    needs:
      - prepare-publish-pre-app
      - prepare-publish-pre-lite
      - prepare-publish-pre-app-with-extension
      - prepare-publish-pre-extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete existing Pre-release release and tag
        uses: actions/github-script@v9
        with:
          script: |
            const tag = 'Pre-release';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`Deleted release for tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release ${tag} not found, skip release delete.`);
              } else {
                throw error;
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted git tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Tag ${tag} not found, skip tag delete.`);
              } else {
                throw error;
              }
            }

  publish-release-pre:
    needs:
      - delete-pre-release-tag
    uses: ./.github/workflows/reusable-publish-release.yml
    with:
      channel: pre
      release_tag: Pre-release
      release_name: Pre-release
      prerelease: true
      publish_artifacts: publish-pre-app,publish-pre-lite,publish-pre-app-with-extension,publish-pre-extension
      cleanup_assets: true
    secrets: inherit

  delete-smart-release-tag:
    needs:
      - prepare-publish-smart-app
      - prepare-publish-smart-extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete existing Smart release and tag
        uses: actions/github-script@v9
        with:
          script: |
            const tag = 'Smart';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`Deleted release for tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Release ${tag} not found, skip release delete.`);
              } else {
                throw error;
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted git tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Tag ${tag} not found, skip tag delete.`);
              } else {
                throw error;
              }
            }

  publish-release-smart:
    needs:
      - delete-smart-release-tag
    uses: ./.github/workflows/reusable-publish-release.yml
    with:
      channel: smart
      release_tag: Smart
      release_name: Smart
      prerelease: true
      publish_artifacts: publish-smart-app,publish-smart-extension
      cleanup_assets: true
    secrets: inherit

