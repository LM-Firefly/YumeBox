name: CI Channel

on:
  push:
    branches: [ "Yume", "Dev" ]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "website/**"
      - ".gitignore"
  schedule:
    - cron: "0 18 * * *"
    - cron: "20 18 * * *"
  workflow_dispatch:

concurrency:
  group: ci-channel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Prepare matrix
        id: set-matrix
        shell: bash
        run: |
          set -eu
          pre='{"channel":"pre","kernel_channel":"alpha","release_tag":"Pre-release","release_name":"Pre-release","meta_asset_name":"yumebox-pre-meta.json","cleanup_assets":true,"prerelease":true,"telegram_title":"YumeBox Pre"}'
          smart='{"channel":"smart","kernel_channel":"smart","release_tag":"Smart","release_name":"Smart","meta_asset_name":"yumebox-smart-meta.json","cleanup_assets":true,"prerelease":true,"telegram_title":"YumeBox Smart"}'

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 18 * * *") matrix="{\"include\":[${pre}]}" ;;
              "20 18 * * *") matrix="{\"include\":[${smart}]}" ;;
              *)
                echo "Unsupported schedule: ${{ github.event.schedule }}" >&2
                exit 1
                ;;
            esac
          else
            matrix="{\"include\":[${pre},${smart}]}"
          fi

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build Native (${{ matrix.channel }})
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: ./.github/workflows/reusable-build-native.yml
    with:
      channel: ${{ matrix.channel }}
      kernel_channel: ${{ matrix.kernel_channel }}
    secrets: inherit

  build-apk-and-publish:
    name: Build APK And Publish (${{ matrix.channel }})
    needs: [prepare-matrix, build-native]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: ./.github/workflows/reusable-build-apk.yml
    with:
      channel: ${{ matrix.channel }}
      release_tag: ${{ matrix.release_tag }}
      release_name: ${{ matrix.release_name }}
      prerelease: ${{ matrix.prerelease }}
      meta_asset_name: ${{ matrix.meta_asset_name }}
      cleanup_assets: ${{ matrix.cleanup_assets }}
      telegram_title: ${{ matrix.telegram_title }}
    secrets: inherit
