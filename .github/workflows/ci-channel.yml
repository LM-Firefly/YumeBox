name: CI Channel

on:
  push:
    branches: [ "Yume", "Dev" ]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "website/**"
      - ".gitignore"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: ci-channel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-native-abi-pre-armeabi-v7a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: armeabi-v7a
    secrets: inherit

  build-native-abi-pre-arm64-v8a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: arm64-v8a
    secrets: inherit

  build-native-abi-pre-x86:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: x86
    secrets: inherit

  build-native-abi-pre-x86_64:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: pre
      kernel_channel: alpha
      abi: x86_64
    secrets: inherit

  build-native-abi-smart-armeabi-v7a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: armeabi-v7a
    secrets: inherit

  build-native-abi-smart-arm64-v8a:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: arm64-v8a
    secrets: inherit

  build-native-abi-smart-x86:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: x86
    secrets: inherit

  build-native-abi-smart-x86_64:
    uses: ./.github/workflows/reusable-build-native-abi.yml
    with:
      channel: smart
      kernel_channel: smart
      abi: x86_64
    secrets: inherit

  bundle-native-pre:
    needs:
      - build-native-abi-pre-armeabi-v7a
      - build-native-abi-pre-arm64-v8a
      - build-native-abi-pre-x86
      - build-native-abi-pre-x86_64
    uses: ./.github/workflows/reusable-bundle-native.yml
    with:
      channel: pre
    secrets: inherit

  bundle-native-smart:
    needs:
      - build-native-abi-smart-armeabi-v7a
      - build-native-abi-smart-arm64-v8a
      - build-native-abi-smart-x86
      - build-native-abi-smart-x86_64
    uses: ./.github/workflows/reusable-bundle-native.yml
    with:
      channel: smart
    secrets: inherit

  build-apk-pre-app:
    needs: bundle-native-pre
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: pre
      module: app
      artifact_prefix: yumebox-pre
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-meta.json
      raw_apk_artifact_name: apk-raw-pre-app
    secrets: inherit

  build-apk-pre-lite:
    needs: bundle-native-pre
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: pre
      module: lite
      artifact_prefix: yumebox-lite-alpha
      release_tag: Pre-release
      meta_asset_name: yumebox-lite-alpha-meta.json
      raw_apk_artifact_name: apk-raw-pre-lite
    secrets: inherit

  build-apk-smart-app:
    needs: bundle-native-smart
    uses: ./.github/workflows/reusable-build-apk-only.yml
    with:
      channel: smart
      module: app
      artifact_prefix: yumebox-smart
      release_tag: Smart
      meta_asset_name: yumebox-smart-meta.json
      raw_apk_artifact_name: apk-raw-smart-app
    secrets: inherit

  prepare-publish-pre-app:
    needs: build-apk-pre-app
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: pre
      module: app
      artifact_prefix: yumebox-pre
      release_tag: Pre-release
      meta_asset_name: yumebox-pre-meta.json
      raw_apk_artifact_name: apk-raw-pre-app
      publish_artifact_name: publish-pre-app
    secrets: inherit

  prepare-publish-pre-lite:
    needs: build-apk-pre-lite
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: pre
      module: lite
      artifact_prefix: yumebox-lite-alpha
      release_tag: Pre-release
      meta_asset_name: yumebox-lite-alpha-meta.json
      raw_apk_artifact_name: apk-raw-pre-lite
      publish_artifact_name: publish-pre-lite
    secrets: inherit

  prepare-publish-smart-app:
    needs: build-apk-smart-app
    uses: ./.github/workflows/reusable-prepare-publish.yml
    with:
      channel: smart
      module: app
      artifact_prefix: yumebox-smart
      release_tag: Smart
      meta_asset_name: yumebox-smart-meta.json
      raw_apk_artifact_name: apk-raw-smart-app
      publish_artifact_name: publish-smart-app
    secrets: inherit

  publish-release-pre:
    needs:
      - prepare-publish-pre-app
      - prepare-publish-pre-lite
    uses: ./.github/workflows/reusable-publish-release.yml
    with:
      channel: pre
      release_tag: Pre-release
      release_name: Pre-release
      prerelease: true
      publish_artifacts: publish-pre-app,publish-pre-lite
      cleanup_assets: true
    secrets: inherit

  publish-release-smart:
    needs: prepare-publish-smart-app
    uses: ./.github/workflows/reusable-publish-release.yml
    with:
      channel: smart
      release_tag: Smart
      release_name: Smart
      prerelease: true
      publish_artifacts: publish-smart-app
      cleanup_assets: true
    secrets: inherit

  notify-pre:
    needs:
      - prepare-publish-pre-app
      - publish-release-pre
    uses: ./.github/workflows/reusable-notify-telegram.yml
    with:
      channel: pre
      release_tag: Pre-release
      publish_artifact_name: publish-pre-app
      meta_asset_name: yumebox-pre-meta.json
      telegram_title: YumeBox Pre
    secrets: inherit

  notify-smart:
    needs:
      - prepare-publish-smart-app
      - publish-release-smart
    uses: ./.github/workflows/reusable-notify-telegram.yml
    with:
      channel: smart
      release_tag: Smart
      publish_artifact_name: publish-smart-app
      meta_asset_name: yumebox-smart-meta.json
      telegram_title: YumeBox Smart
    secrets: inherit
