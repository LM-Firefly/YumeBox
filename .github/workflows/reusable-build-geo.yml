name: Reusable Build Geo

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Build geo assets
        run: kotlin scripts/native-build.main.kts --geo

      - name: Verify geo outputs
        shell: bash
        run: |
          set -eu
          test -f "build/generated/assets/geo/geoip.metadb.xz"
          test -f "build/generated/assets/geo/geosite.dat.xz"
          test -f "build/generated/assets/geo/ASN.mmdb.xz"

      - name: Upload geo artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ inputs.channel }}-geo
          path: |
            build/generated/assets/geo/geoip.metadb.xz
            build/generated/assets/geo/geosite.dat.xz
            build/generated/assets/geo/ASN.mmdb.xz
          if-no-files-found: error
