name: Reusable Build Native ABI

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      kernel_channel:
        required: true
        type: string
      abi:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@main

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: 'https://github.com/MetaCubeX/go/releases/download/build'
          go-version: '1.26'

      - name: Apply Go patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lib/native/rust/target/
          key: ${{ runner.os }}-rust-v2-${{ inputs.abi }}-${{ hashFiles('lib/native/rust/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-v2-${{ inputs.abi }}-
            ${{ runner.os }}-rust-v2-

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
          key: ${{ runner.os }}-ndk-29.0.14206865-v2
          restore-keys: |
            ${{ runner.os }}-ndk-29.0.14206865-v2-

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;29.0.14206865"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> local.properties

      - name: Update CA certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          mkdir -p core/src/foss/golang/mihomo/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/mihomo/component/ca/ca-certificates.crt

      - name: Sync kernel
        run: |
          chmod +x scripts/sync-kernel.sh
          ./scripts/sync-kernel.sh "${{ inputs.kernel_channel }}"

      - name: Sync Rust submodule
        run: |
          git submodule sync -- lib/native/rust
          git submodule update --init --recursive -- lib/native/rust
          test -f lib/native/rust/Cargo.toml

      - name: Build native libraries for ABI
        env:
          ABI_APP_LIST: ${{ inputs.abi }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14206865
        run: kotlin scripts/native-build.main.kts --go --rust --cpp

      - name: Verify native outputs
        shell: bash
        run: |
          set -eu
          test -f "jniLibs/${{ inputs.abi }}/libclash.so"
          test -f "jniLibs/${{ inputs.abi }}/liboverride.so"
          test -f "jniLibs/${{ inputs.abi }}/libbridge.so"

      - name: Upload ABI artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ inputs.channel }}-${{ inputs.abi }}
          path: |
            jniLibs/${{ inputs.abi }}/libclash.so
            jniLibs/${{ inputs.abi }}/liboverride.so
            jniLibs/${{ inputs.abi }}/libbridge.so
          if-no-files-found: error
